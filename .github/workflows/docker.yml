name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t piigateway-api .

      - name: Build PII Service image
        run: docker build -f docker/Dockerfile.pii-service -t piigateway-pii-service .

      - name: Build Frontend image
        run: docker build -f docker/Dockerfile.frontend -t piigateway-frontend .

      - name: Tag and push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag piigateway-api ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          docker tag piigateway-api ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          docker tag piigateway-pii-service ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pii-service:latest
          docker tag piigateway-pii-service ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pii-service:${{ github.sha }}
          docker tag piigateway-frontend ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          docker tag piigateway-frontend ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pii-service:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pii-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
